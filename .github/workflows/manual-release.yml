name: Manual release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer tag to release, e.g. 0.0.1'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: v${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Build project
        run: |
          uv build
      - name: Verify wheel contains web service
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("*.whl"))
          names = set(zipfile.ZipFile(wheel).namelist())
          for name in ("spotify_splitter/main.py", "spoti2_service/service_app.py"):
              if name not in names:
                  raise SystemExit(f"wheel missing {name}")
          PY
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            install.sh
            INSTALL.md

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libportaudio2 python3-gi gir1.2-glib-2.0
      - name: Install Python dependencies
        run: |
          uv venv --python "${{ matrix.python-version }}"
          uv pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          .venv/bin/pytest -q

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Build wheel
        run: |
          uv build --wheel --out-dir dist
      - name: Verify wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("*.whl"))
          names = set(zipfile.ZipFile(wheel).namelist())
          required = {
              "spotify_splitter/main.py",
              "spoti2_service/service_app.py",
              "spoti2_service/web_ui.py",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"wheel missing files: {missing}")
          PY
      - name: Install and import wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import spotify_splitter.main, spoti2_service.service_app"
